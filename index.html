<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#7a6a53">
<title>Find Your Table</title>
<style>
  :root{
    --bg:#f7f2ea;
    --card:#fffdf9;
    --ink:#3d3528;
    --muted:#9b8f7c;
    --gold:#b08d57;
    --gold-soft:#e7d9bf;
    --line:#ece3d4;
    --accent:#7a6a53;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, #fffdf8 0%, rgba(255,253,248,0) 60%),
      var(--bg);
    color:var(--ink);
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    justify-content:center;
    padding:24px 18px 60px;
  }
  .wrap{width:100%;max-width:520px;}

  header{text-align:center;margin:18px 0 22px;}
  .eyebrow{
    letter-spacing:.32em;text-transform:uppercase;font-size:11px;
    color:var(--gold);font-weight:600;margin-bottom:10px;
  }
  h1{
    font-family:Georgia,"Times New Roman",serif;
    font-weight:400;font-size:34px;line-height:1.15;margin:0;
    color:var(--accent);
  }
  h1 .amp{color:var(--gold);font-style:italic;}
  .sub{color:var(--muted);font-size:14px;margin-top:10px;}
  .rule{
    width:54px;height:1px;background:var(--gold-soft);
    margin:16px auto 0;position:relative;
  }
  .rule::before{
    content:"\2766";position:absolute;top:-11px;left:50%;transform:translateX(-50%);
    color:var(--gold);font-size:16px;background:var(--bg);padding:0 8px;
  }

  .search{
    position:relative;margin:8px 0 18px;
  }
  .search input{
    width:100%;font-size:18px;padding:16px 46px 16px 18px;
    border:1px solid var(--line);border-radius:14px;background:var(--card);
    color:var(--ink);outline:none;box-shadow:0 6px 18px rgba(122,106,83,.06);
    transition:border-color .15s, box-shadow .15s;
  }
  .search input:focus{border-color:var(--gold);box-shadow:0 6px 22px rgba(176,141,87,.15);}
  .search input::placeholder{color:#c3b8a4;}
  .search .clear{
    position:absolute;right:8px;top:50%;transform:translateY(-50%);
    border:none;background:transparent;color:var(--muted);font-size:22px;
    width:34px;height:34px;border-radius:50%;cursor:pointer;display:none;
  }
  .search .clear:active{background:#f0e8da;}

  .hint{text-align:center;color:var(--muted);font-size:13px;margin:-6px 0 18px;}

  .results{display:flex;flex-direction:column;gap:10px;}
  .guest{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;cursor:pointer;
    transition:transform .08s, border-color .15s, box-shadow .15s;
  }
  .guest:active{transform:scale(.99);}
  .guest:hover{border-color:var(--gold-soft);box-shadow:0 6px 16px rgba(122,106,83,.07);}
  .guest .name{font-size:17px;font-weight:600;}
  .guest .name small{display:block;font-weight:400;color:var(--muted);font-size:12.5px;margin-top:2px;}
  .badge{
    flex:none;min-width:58px;text-align:center;
    background:linear-gradient(180deg,#fbf4e6,#f3e7cd);
    border:1px solid var(--gold-soft);border-radius:10px;
    padding:8px 10px;color:var(--accent);
  }
  .badge .t{display:block;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);}
  .badge .n{display:block;font-size:20px;font-weight:700;line-height:1.1;}

  .empty{text-align:center;color:var(--muted);padding:34px 10px;font-size:15px;}
  .empty .big{font-size:40px;display:block;margin-bottom:10px;opacity:.5;}

  /* Big reveal overlay */
  .overlay{
    position:fixed;inset:0;background:rgba(61,53,40,.55);
    backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;padding:24px;z-index:50;
  }
  .overlay.show{display:flex;animation:fade .2s ease;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .reveal{
    background:var(--card);border-radius:22px;width:100%;max-width:380px;
    padding:34px 28px 28px;text-align:center;position:relative;
    box-shadow:0 24px 60px rgba(0,0,0,.25);border:1px solid var(--gold-soft);
    animation:pop .25s cubic-bezier(.2,.9,.3,1.2);
  }
  @keyframes pop{from{transform:scale(.9);opacity:.4}to{transform:scale(1);opacity:1}}
  .reveal .close{
    position:absolute;top:12px;right:14px;border:none;background:transparent;
    font-size:26px;color:var(--muted);cursor:pointer;line-height:1;
  }
  .reveal .gname{font-size:22px;font-weight:600;margin:2px 0 4px;}
  .reveal .gsub{color:var(--muted);font-size:13.5px;margin-bottom:22px;}
  .reveal .tlabel{letter-spacing:.3em;text-transform:uppercase;font-size:12px;color:var(--gold);}
  .reveal .tnum{
    font-family:Georgia,serif;font-size:96px;line-height:1;color:var(--accent);
    margin:6px 0 4px;font-weight:400;
  }
  .reveal .welcome{color:var(--muted);font-size:13px;margin-top:14px;}

  footer{text-align:center;color:#c8bca8;font-size:11px;margin-top:34px;letter-spacing:.05em;}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">Welcome &middot; 欢迎</div>
      <h1>Find Your Table</h1>
      <div class="sub">Type your first or last name &middot; 请输入您的姓或名</div>
      <div class="rule"></div>
    </header>

    <div class="search">
      <input id="q" type="text" inputmode="search" autocomplete="off" autocapitalize="words"
             placeholder="Start typing your name…" aria-label="Search your name">
      <button class="clear" id="clear" aria-label="Clear">&times;</button>
    </div>

    <div id="results" class="results"></div>

    <footer>Tap your name to see your table</footer>
  </div>

  <div class="overlay" id="overlay">
    <div class="reveal">
      <button class="close" id="close" aria-label="Close">&times;</button>
      <div class="gname" id="rName"></div>
      <div class="gsub" id="rSub"></div>
      <div class="tlabel">Table &middot; 桌号</div>
      <div class="tnum" id="rNum"></div>
      <div class="welcome">We're so glad you're here 💛</div>

  </div>

/* ---- Helpers ---- */
function norm(s){
  return (s||"").toString().toLowerCase()
    .normalize("NFD").replace(/[̀-ͯ]/g,"") // strip accents
    .replace(/[().,]/g," ")
    .replace(/\s+/g," ").trim();
}
// Precompute a search haystack for each guest
GUESTS.forEach(g=>{
  g.full = (g.f + " " + g.l).trim();
  g._h = norm(g.f + " " + g.l + " " + g.l + " " + g.f + " " + (g.c||""));
  g._hns = g._h.replace(/\s+/g,""); // same haystack with ALL spaces removed
});

const q = document.getElementById("q");
const clearBtn = document.getElementById("clear");
const results = document.getElementById("results");
const overlay = document.getElementById("overlay");

function search(query){
  const nq = norm(query);
  if(!nq) return [];
  const tokens = nq.split(" ").filter(Boolean);
  const nqns = nq.replace(/\s+/g,""); // query with all spaces removed
  return GUESTS.filter(g =>
    tokens.every(t => g._h.includes(t)) ||   // each typed word appears somewhere
    g._hns.includes(nqns)                    // or it matches ignoring spaces entirely
  );
}

function render(query){
  clearBtn.style.display = query ? "block" : "none";
  if(!query.trim()){
    results.innerHTML = "";
    return;
  }
  const matches = search(query);
  if(matches.length === 0){
    results.innerHTML =
      '<div class="empty"><span class="big">&#128269;</span>' +
      "No match found. Check the spelling, or try just your last name.<br>" +
      '<span style="font-size:13px;color:#b5a890">未找到，请检查拼写或只输入姓氏</span></div>';
    return;
  }
  // sort: matches whose name STARTS with the query first
  const nq = norm(query);
  matches.sort((a,b)=>{
    const as = a._h.startsWith(nq)?0:1, bs = b._h.startsWith(nq)?0:1;
    if(as!==bs) return as-bs;
    return a.full.localeCompare(b.full);
  });
  results.innerHTML = matches.slice(0,40).map((g)=>{
    const idx = GUESTS.indexOf(g);
    return '<div class="guest" data-i="'+idx+'">'+
        '<div class="name">'+esc(g.full)+'</div>'+
        '<div class="badge"><span class="t">Table</span><span class="n">'+esc(g.t)+'</span></div>'+
      '</div>';
  }).join("");
}

function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

function showReveal(g){
  document.getElementById("rName").textContent = g.full;
  document.getElementById("rSub").textContent = g.l ? (g.f + " · " + g.l) : "";
  document.getElementById("rNum").textContent = g.t;
  overlay.classList.add("show");
}
function hideReveal(){ overlay.classList.remove("show"); }

/* ---- Events ---- */
q.addEventListener("input", e => render(e.target.value));
clearBtn.addEventListener("click", () => { q.value=""; render(""); q.focus(); });
results.addEventListener("click", e => {
  const card = e.target.closest(".guest");
  if(!card) return;
  showReveal(GUESTS[+card.dataset.i]);
});
document.getElementById("close").addEventListener("click", hideReveal);
overlay.addEventListener("click", e => { if(e.target===overlay) hideReveal(); });
document.addEventListener("keydown", e => { if(e.key==="Escape") hideReveal(); });

q.focus();
</script>
</body>
</html>
